version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: choons-postgres
    environment:
      POSTGRES_DB: choons
      POSTGRES_USER: choons
      POSTGRES_PASSWORD: choons
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U choons -d choons"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: choons-backend
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URI: jdbc:postgresql://postgres:5432/choons
      POSTGRES_USER: choons
      POSTGRES_PASS: choons
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
