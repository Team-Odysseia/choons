spring.application.name=choons

# Porta do Servidor
server.port=8080

# Ativaï¿½ï¿½o das Virtual Threads (JDK 21+)
spring.threads.virtual.enabled=true

# Configuraï¿½ï¿½o do Banco de Dados PostgreSQL
spring.datasource.url=${POSTGRES_URI}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASS}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Limites de Upload (Importante para arquivos de ï¿½udio)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=1GB
server.tomcat.max-http-form-post-size=-1

# Configuraï¿½ï¿½es do Cloudflare R2
r2.endpoint=${R2_ENDPOINT}
r2.bucket-name=choons
r2.access-key=${R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY}

# JWT
jwt.secret=${JWT_SECRET:LYqyfJlfJhOiIzum61lUAdHAJVYzbdi8kxn9c1UiLcB}

# CORS (comma-separated exact origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Auth cookie
auth.cookie.name=${AUTH_COOKIE_NAME:CHOONS_AUTH}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}

# Rate Limiting (per IP, in-memory)
rate-limit.login-capacity=10
rate-limit.login-refill-per-minute=10
rate-limit.stream-capacity=60
rate-limit.stream-refill-per-minute=60
