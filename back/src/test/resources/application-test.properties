# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Dummy R2 config (not used in auth tests)
r2.endpoint=http://localhost:19999
r2.bucket-name=test-bucket
r2.access-key=test-key
r2.secret-key=test-secret-key-32-chars-padding-x

# JWT (same default from main application.properties)
jwt.secret=LYqyfJlfJhOiIzum61lUAdHAJVYzbdi8kxn9c1UiLcB

# Suppress noisy startup logs
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Rate limiting — high enough that other tests never exhaust a bucket.
# RateLimitFilterTest overrides these with @TestPropertySource to use low values.
rate-limit.login-capacity=1000
rate-limit.login-refill-per-minute=1000
rate-limit.stream-capacity=1000
rate-limit.stream-refill-per-minute=1000
